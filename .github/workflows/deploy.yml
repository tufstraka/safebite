name: Deploy SafeBite (Webhook)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger deployment webhook
        env:
          WEBHOOK_SECRET: safebite-deploy-secret-2026
          WEBHOOK_URL: https://safebite.locsafe.org/webhook
        run: |
          # Get commit message (escape special chars)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1 | sed 's/"/\\"/g')
          
          # Create simple payload
          PAYLOAD=$(cat <<EOF
          {
            "ref": "refs/heads/main",
            "pusher": {
              "name": "${{ github.actor }}"
            },
            "head_commit": {
              "message": "$COMMIT_MSG"
            }
          }
          EOF
          )
          
          # Calculate signature
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
          
          # Send webhook
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Webhook accepted! Deployment started."
          else
            echo "❌ Webhook failed with code: $HTTP_CODE"
            exit 1
          fi
          
          echo "⏳ Deployment running on server..."
          echo "🌐 Check: https://safebite.locsafe.org"

name: Deploy SafeBite (Webhook)

on:
  push:
    branches:
      - main

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger deployment webhook
        run: |
          curl -X POST https://safebite.locsafe.org/webhook \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ toJson(github) }}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | sed 's/^.* //')" \
            -d '${{ toJson(github) }}'
          
          echo "✅ Webhook triggered!"
          echo "⏳ Deployment running on server..."
          echo "🌐 Check: https://safebite.locsafe.org"
